version: v1
mode: enforce
rules:
  - name: admin-exec
    match:
      methods: ["tools/call"]
      tools: ["exec_*"]
      subjects: ["admin-*"]
    action: allow
  - name: deny-exec
    match:
      methods: ["tools/call"]
      tools: ["exec_*"]
    action: deny
  - name: default-allow
    match:
      methods: ["*"]
    action: allow
